name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      # Fast, no-browser gate: catches broken WGSL templates + struct/UBO drift.
      - name: Shader integrity
        run: node test/check-shaders.mjs
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      # Boots WebGPU via SwiftShader and renders every mode; fails on any
      # WGSL/pipeline error or blank render.
      - name: Smoke test (all modes)
        run: node test/smoke.mjs
      - name: Functional test (randomize/presets/mode-switch)
        run: node test/functional.mjs
